<header class="site-header">
  <mat-toolbar class="toolbar">
    <button class="menu-toggle" mat-icon-button (click)="toggleSidenav.emit()" aria-label="Abrir menú">
      <mat-icon>menu</mat-icon>
    </button>

    <span class="spacer"></span>

    @if (currentUser(); as user) {
      <div class="user-chip">
        <mat-icon>person</mat-icon>
        <span>{{ user.nombre }}</span>
        <strong>{{ user.role }}</strong>
      </div>
      <button mat-flat-button color="primary" (click)="logoutUser.emit()">Salir</button>
    } @else {
      <button mat-stroked-button color="primary" (click)="loginClient.emit()">Cliente demo</button>
      <button mat-flat-button color="primary" (click)="loginAdmin.emit()">Admin demo</button>
    }
  </mat-toolbar>
</header>
